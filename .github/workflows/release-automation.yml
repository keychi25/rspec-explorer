name: Release Automation

on:
  push:
    branches:
      - master

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

concurrency:
  group: release-automation
  cancel-in-progress: true

jobs:
  prepare_release_pr:
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    outputs:
      release_merged: ${{ steps.wait_for_merge.outputs.merged }}
      release_merge_sha: ${{ steps.wait_for_merge.outputs.merge_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Prepare next release version
        run: node scripts/prepare-release-version.mjs

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release branch contents
        run: |
          pnpm -s prepublish:check
          pnpm -s check
          pnpm -s lint
          pnpm -s test

      - name: Read release version
        id: version
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_name=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create or update release pull request
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(release): v${{ steps.version.outputs.version }}"
          branch: release/auto-version
          delete-branch: true
          title: "chore(release): v${{ steps.version.outputs.version }}"
          body: |
            ## 概要

            - `master` への変更をもとに自動生成した release PR です
            - `package.json` の version と `CHANGELOG.md` を更新しています

            ## 次の動作

            - CI が通ると auto-merge されます
            - merge 後に同じ workflow 内で tag 作成と release publish を行います
          labels: release

      - name: Resolve release pull request number
        id: release_pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PR_NUMBER="$(gh pr list \
            --repo "${{ github.repository }}" \
            --head release/auto-version \
            --state open \
            --json number \
            --jq '.[0].number')"
          if [ -z "${PR_NUMBER}" ] || [ "${PR_NUMBER}" = "null" ]; then
            echo "ERROR: release pull request was not found." >&2
            exit 1
          fi
          echo "number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Trigger CI for release pull request branch
        id: release_ci
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          HEAD_SHA="$(gh pr view "${{ steps.release_pr.outputs.number }}" --json headRefOid --jq '.headRefOid')"
          gh workflow run CI \
            --repo "${{ github.repository }}" \
            --ref release/auto-version
          for _ in $(seq 1 20); do
            RUN_ID="$(gh run list \
              --repo "${{ github.repository }}" \
              --workflow CI \
              --branch release/auto-version \
              --event workflow_dispatch \
              --json databaseId,headSha \
              --jq ".[] | select(.headSha == \"${HEAD_SHA}\") | .databaseId" \
              | head -n 1)"
            if [ -n "${RUN_ID}" ]; then
              echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"
              echo "head_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 3
          done
          echo "ERROR: release branch CI run was not found." >&2
          exit 1

      - name: Bridge release CI result into required status check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh run watch "${{ steps.release_ci.outputs.run_id }}" --repo "${{ github.repository }}" --exit-status; then
            STATE=success
            DESCRIPTION='Release automation checks passed'
          else
            STATE=failure
            DESCRIPTION='Release automation checks failed'
          fi
          gh api \
            --method POST \
            "repos/${{ github.repository }}/statuses/${{ steps.release_ci.outputs.head_sha }}" \
            -f state="${STATE}" \
            -f context=test \
            -f description="${DESCRIPTION}" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ steps.release_ci.outputs.run_id }}"
          if [ "${STATE}" != "success" ]; then
            exit 1
          fi

      - name: Enable auto-merge for release pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge --auto --squash "${{ steps.release_pr.outputs.number }}"

      - name: Wait for release pull request merge
        id: wait_for_merge
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PR_NUMBER="${{ steps.release_pr.outputs.number }}"
          for _ in $(seq 1 60); do
            read -r STATE MERGED_AT MERGE_SHA <<<"$(gh pr view "${PR_NUMBER}" \
              --repo "${{ github.repository }}" \
              --json state,mergedAt,mergeCommit \
              --jq '[.state, (.mergedAt // ""), (.mergeCommit.oid // "")] | @tsv')"
            if [ "${STATE}" = "MERGED" ] && [ -n "${MERGE_SHA}" ]; then
              echo "merged=true" >> "$GITHUB_OUTPUT"
              echo "merge_sha=${MERGE_SHA}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [ "${STATE}" = "CLOSED" ] && [ -z "${MERGED_AT}" ]; then
              echo "ERROR: release pull request was closed before merge." >&2
              exit 1
            fi
            sleep 5
          done
          echo "ERROR: timed out waiting for release pull request merge." >&2
          exit 1

  publish_release:
    needs: prepare_release_pr
    if: ${{ needs.prepare_release_pr.outputs.release_merged == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare_release_pr.outputs.release_merge_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Read release metadata
        id: release_meta
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_name=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release sanity checks
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: node scripts/release-prod-check.mjs

      - name: Build + test + package VSIX
        run: pnpm -s prepublish:verify

      - name: Create and push release tag
        run: node scripts/create-release-tag.mjs --push --skip-if-exists

      - name: Locate VSIX
        id: vsix
        shell: bash
        run: |
          set -euo pipefail
          VSIX_PATH="$(ls -1 *.vsix | head -n 1)"
          echo "vsix_path=${VSIX_PATH}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload VSIX
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          files: ${{ steps.vsix.outputs.vsix_path }}
          generate_release_notes: true
          prerelease: ${{ vars.MARKETPLACE_PRERELEASE == 'true' }}

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          set -euo pipefail
          if [ "${{ vars.MARKETPLACE_PRERELEASE }}" = "true" ]; then
            pnpm -s release:publish:prerelease
          else
            pnpm -s release:publish
          fi
